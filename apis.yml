apis:
  - aid: blobr:blobr-api-portal
    name: Blobr API Portal Platform
    description: >-
      Blobr provides a platform for creating branded API portals where
      developers can explore documentation, select API products, subscribe
      to pricing plans, and start implementing APIs. The platform acts as
      an API proxy, supporting subscription-based, tiered, and metered
      monetization models.
